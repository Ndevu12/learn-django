{% extends "books/base.html" %}
{% block title %}{{ book.title }}{% endblock %}

{% block content %}
<h2>{{ book.title }}</h2>

<dl>
  <dt>Author</dt>
  <dd>{{ book.author }}</dd>

  <dt>Pages</dt>
  <dd>{{ book.pages }}</dd>

  <dt>Published</dt>
  <dd>{{ book.pub_date }}</dd>
</dl>

<div class="actions">
  <a href="{% url 'book-update' book.pk %}">Edit</a>
  <a href="{% url 'book-delete' book.pk %}">Delete</a>
  <a href="{% url 'book-list' %}">Back to list</a>
</div>
{% endblock %}
